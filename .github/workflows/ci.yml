name: Finaya CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Backend Tests
  # ──────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock pytest-cov

      - name: Run tests with coverage
        env:
          CORS_ORIGINS: "http://localhost:5173"
          SECRET_KEY: "test-secret-key-ci"
          GEMINI_API_KEY: ""
          GEMINI_MODEL: "gemini-2.0-flash"
          FIREBASE_PROJECT_ID: ""
          REDIS_URL: ""
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # ──────────────────────────────────────
  # Frontend Build
  # ──────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: "https://finaya-api.up.railway.app/api/v1"
        run: npm run build

  # ──────────────────────────────────────
  # Docker Build Verification
  # ──────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t finaya-backend ./backend

      - name: Build frontend image
        run: docker build -t finaya-frontend ./frontend
